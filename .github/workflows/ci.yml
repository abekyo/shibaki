name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test tests/

      - name: Doctor smoke test (no key → must exit non-zero, fail-closed)
        # Strip every API key the doctor knows about so the run hits the
        # "no critic key" branch. If doctor exits 0 here, fail-closed is broken.
        env:
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          GEMINI_API_KEY: ""
        run: |
          set +e
          bun run bin/shibaki.ts doctor
          code=$?
          set -e
          if [ "$code" = "0" ]; then
            echo "FAIL: doctor exited 0 with no API keys (expected non-zero, fail-closed)"
            exit 1
          fi
          echo "OK: doctor exited $code with no API keys (fail-closed working)"
