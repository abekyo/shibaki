<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    Shibaki icon — open palm in slap motion.
    concept: AI をしばく / ビンタする meta-correction layer
    background: deep ink, hand: cream, motion lines: red
  -->
  <rect width="256" height="256" rx="40" fill="#0f0f0f"/>

  <!-- impact / motion lines on the left (red, suggesting slap force) -->
  <g stroke="#ff5a5a" stroke-width="6" stroke-linecap="round" fill="none">
    <line x1="22" y1="118" x2="56" y2="128"/>
    <line x1="22" y1="148" x2="56" y2="148"/>
    <line x1="22" y1="178" x2="56" y2="168"/>
  </g>

  <!-- hand: palm + 4 fingers + thumb, all in cream -->
  <g fill="#f5f5f5">
    <!-- palm (rounded rect) -->
    <rect x="84" y="118" width="100" height="84" rx="20"/>

    <!-- 4 fingers (vertical capsules, varying heights for natural look) -->
    <rect x="92"  y="38"  width="20" height="92" rx="10"/>  <!-- index   -->
    <rect x="118" y="22"  width="20" height="108" rx="10"/> <!-- middle  -->
    <rect x="144" y="32"  width="20" height="98" rx="10"/>  <!-- ring    -->
    <rect x="170" y="50"  width="20" height="80" rx="10"/>  <!-- pinky   -->

    <!-- thumb (angled to the right side of palm) -->
    <path d="M 184 138
             Q 220 130 226 162
             Q 226 188 198 192
             L 184 192 Z"/>
  </g>
</svg>
